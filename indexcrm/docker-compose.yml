services:
  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,web}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000,http://localhost:3001,http://127.0.0.1:3001}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001}
      DATABASE_URL: postgres://${POSTGRES_USER:-index}:${POSTGRES_PASSWORD:-index}@db:5432/${POSTGRES_DB:-index}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      WAIT_FOR_DATABASE: "1"
      RUN_MIGRATIONS: "1"
      COLLECT_STATIC: "0"
    volumes:
      - .:/app
      - staticfiles:/app/staticfiles
      - media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery:
    build: .
    command: celery -A config worker --loglevel=info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-index}:${POSTGRES_PASSWORD:-index}@db:5432/${POSTGRES_DB:-index}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      WAIT_FOR_DATABASE: "1"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

  celery-beat:
    build: .
    command: celery -A config beat --loglevel=info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-index}:${POSTGRES_PASSWORD:-index}@db:5432/${POSTGRES_DB:-index}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      WAIT_FOR_DATABASE: "1"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-index}
      POSTGRES_USER: ${POSTGRES_USER:-index}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-index}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/app/staticfiles:ro
      - media:/app/media:ro
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  postgres_data:
  staticfiles:
  media:
